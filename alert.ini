; Per-window alert toggle for channels and queries
; Edit the PowerShell command inside alias alertplaysound to point to your sound file.
; Example sound path:
; C:\Windows\Media\Windows Notify.wav

; -----------------------
; Formatting / helpers
; -----------------------

alias alertplaysound {
  ; $1 = cooldown target, usually channel or query nick

  var %target = $1

  if (%target) {
    if ($hget(alertcooldowns,%target)) return
  }

  ; Edit the quoted .wav path in the PowerShell command below to your own sound file.
  ; Keep the outer double quotes and the inner single quotes as they are.
  run -h powershell -Command "(New-Object Media.SoundPlayer 'C:\Windows\Media\Windows Notify.wav').PlaySync()"
  ;=============================REPLACE THIS TO YOUR SOUND PATH^^^

  if (%target) {
    var %seconds = %alert_cooldown_default
    if (%seconds !isnum 1-) var %seconds = 10

    hadd -m alertcooldowns %target 1
    $+(.timeralertcooldown_,$ticks,$rand(1000,9999)) 1 %seconds alert_cooldownexpire %target
  }
}


alias alertcolor {
  return $+($chr(4),50FA7B)
}

alias alertsay {
  if (%alert_silent) return
  echo -a $+($alertcolor,$chr(91),$time(HH:nn:ss),$chr(93)) * $1-
}

alias alertmsg {
  alertsay Alert is now $1 for $2
}

alias alertdefaultsfile {
  return $+($scriptdir,alert_defaults.txt)
}


alias alert_initsettings {
  ; Default per-target sound cooldown, in seconds.
  if (!%alert_cooldown_default) set %alert_cooldown_default 2
}

alias alertduration {
  ; Supports: 60, 60s, 5m, 2h
  if (!$1) return 0

  var %d = $lower($1)

  if (%d isnum 1-) return %d

  var %unit = $right(%d,1)
  var %num = $mid(%d,1,$calc($len(%d) - 1))

  if (%num !isnum 1-) return 0

  if (%unit == s) return %num
  if (%unit == m) return $calc(%num * 60)
  if (%unit == h) return $calc(%num * 3600)

  return 0
}

alias alert_cooldownexpire {
  ; $1 = cooldown target
  if ($1) hdel alertcooldowns $1
}

alias alert_cooldown {
  ; /alert cooldown [time]

  if (!$1) {
    alertsay Current alert cooldown is %alert_cooldown_default seconds.
    return
  }

  var %seconds = $alertduration($1)

  if (%seconds <= 0) {
    alertsay Error: invalid cooldown. Use examples like 10s, 5m, or 2h.
    return
  }

  set %alert_cooldown_default %seconds
  alertsay Alert cooldown is now $1 $+($chr(40),%seconds seconds,$chr(41))
}

; -----------------------
; Timer helpers
; -----------------------

alias alert_stoptimer {
  ; $1 = timer name, without the "timer" prefix
  if ($1) {
    $+(.timer,$1) off
  }
}

alias alert_starttimer {
  ; $1 = timer name, without the "timer" prefix
  ; $2 = seconds
  if (($1) && ($2)) {
    $+(.timer,$1) 1 $2 alert_tempexpire $1
  }
}

alias alert_canceltimer {
  ; $1 = target

  if ($hget(alerttimers,$1)) {
    var %t = $hget(alerttimers,$1)

    if (%t) {
      alert_stoptimer %t
      hdel alerttimer_target %t
      hdel alerttimer_action %t
    }

    hdel alerttimers $1
  }
}

alias alert_cancelalltimers {
  if (!$hget(alerttimers)) return

  var %i = 1

  while (%i <= $hget(alerttimers,0).item) {
    var %t = $hget(alerttimers,%i).data

    if (%t) {
      alert_stoptimer %t
      hdel alerttimer_target %t
      hdel alerttimer_action %t
    }

    inc %i
  }

  if ($hget(alerttimers)) hfree alerttimers
  if ($hget(alerttimer_target)) hfree alerttimer_target
  if ($hget(alerttimer_action)) hfree alerttimer_action
}

alias alert_tempexpire {
  ; $1 = timer name

  var %timer = $1
  var %target = $hget(alerttimer_target,%timer)
  var %action = $hget(alerttimer_action,%timer)

  if (!%target) return

  hdel alerttimer_target %timer
  hdel alerttimer_action %timer
  hdel alerttimers %target

  if (%action == on) {
    hdel alerts %target
    alertmsg OFF %target
    return
  }

  if (%action == off) {
    hadd -m alerts %target 1
    alertmsg ON %target
    return
  }
}

; -----------------------
; Help / lists
; -----------------------

alias alert_help {
  alertsay Alert commands:
  echo -a $+($alertcolor,/alert) - toggle alert for current channel/query
  echo -a $+($alertcolor,/alert [on/off] [channel/nick/all] [time]) - enable/disable alert for a channel/nick or all, time is in seconds by default(optional suffixes h/m/s)
  echo -a $+($alertcolor,/alert cooldown [time]) - temporarily set sound cooldown, default is 2s
  echo -a $+($alertcolor,/alert ignore nick) - ignore alerts from nick
  echo -a $+($alertcolor,/alert unignore nick) - stop ignoring nick
  echo -a $+($alertcolor,/alert unignore all) - stop ignoring all nicks
  echo -a $+($alertcolor,/alert ignore list) - list currently ignored nicks
  echo -a $+($alertcolor,/alert setdefault ignore nick) - save a persistent ignored nick
  echo -a $+($alertcolor,/alert list) - list enabled alerts
  echo -a $+($alertcolor,/alert defaults) - list persistent default commands
  echo -a $+($alertcolor,/alert setdefault [command]) - save and apply a persistent default command
  echo -a $+($alertcolor,/alert setdefault cooldown [time]) - save and apply persistent sound cooldown
  echo -a $+($alertcolor,/alert resetdefault) - remove all persistent default commands
  echo -a $+($alertcolor,/alert restoredefaults) - remove all session based configs and apply defaults
  echo -a $+($alertcolor,/alert help) - show this help
}

alias alert_list {
  alertsay Enabled alerts:

  if (!$hget(alerts,0).item) {
    echo -a $+($alertcolor,-) none
    return
  }

  var %i = 1
  while (%i <= $hget(alerts,0).item) {
    echo -a $+($alertcolor,-) $hget(alerts,%i).item
    inc %i
  }
}

alias alert_ignorelist {
  alertsay Currently ignored nicks:

  if (!$hget(alertignore,0).item) {
    echo -a $+($alertcolor,-) none
    return
  }

  var %i = 1
  while (%i <= $hget(alertignore,0).item) {
    echo -a $+($alertcolor,-) $hget(alertignore,%i).item
    inc %i
  }
}

alias alert_defaults {
  var %f = $alertdefaultsfile

  alertsay Persistent default commands:

  if (!$exists(%f)) {
    echo -a $+($alertcolor,-) none
    return
  }

  if (!$lines(%f)) {
    echo -a $+($alertcolor,-) none
    return
  }

  var %i = 1
  while (%i <= $lines(%f)) {
    echo -a $+($alertcolor,-) /alert $read(%f,%i)
    inc %i
  }
}

; -----------------------
; Defaults
; -----------------------

alias alert_setdefault {
  if (!$1) {
    alertsay Usage: /alert setdefault [command]
    return
  }

  if (($1 == help) || ($1 == list) || ($1 == defaults) || ($1 == setdefault) || ($1 == resetdefault) || ($1 == restoredefaults)) {
    alertsay Error: that command cannot be saved as a default.
    return
  }

  if (($1 != on) && ($1 != off) && ($1 != ignore) && ($1 != unignore) && ($1 != cooldown)) {
    alertsay Error: only on/off/ignore/unignore/cooldown commands can be saved as defaults.
    return
  }

  if ($1 == cooldown) {
    if (!$2) {
      alertsay Usage: /alert setdefault cooldown 10s
      return
    }

    if ($3) {
      alertsay Usage: /alert setdefault cooldown 10s
      return
    }

    if ($alertduration($2) <= 0) {
      alertsay Error: invalid cooldown. Use examples like 10s, 5m, or 2h.
      return
    }
  }

  if ((($1 == on) || ($1 == off)) && (!$2)) {
    alertsay Error: default on/off commands must include a target or all.
    return
  }

  if ((($1 == on) || ($1 == off)) && ($3)) {
    alertsay Error: temporary alerts cannot be saved as defaults.
    return
  }

  if ((($1 == ignore) || ($1 == unignore)) && (!$2)) {
    alertsay Usage: /alert setdefault $1 nick
    return
  }

  var %f = $alertdefaultsfile
  write $qt(%f) $1-

  alertsay Added default command: /alert $1-

  ; Also apply it now.
  alert_do $1-
}

alias alert_resetdefault {
  var %f = $alertdefaultsfile

  if ($exists(%f)) remove $qt(%f)

  alertsay Persistent default commands reset.
}

alias alert_resetsession {
  ; Reset session-only state so defaults can be reapplied cleanly.
  if ($hget(alerts)) hfree alerts
  if ($hget(alertignore)) hfree alertignore
  if ($hget(alertcooldowns)) hfree alertcooldowns

  alert_cancelalltimers

  unset %alert_cooldown_default
}

alias alert_restoredefaults {
  alert_resetsession
  alert_initsettings

  var %count = $alert_applydefaults

  if (%count > 0) {
    alertsay Persistent default commands restored. Session reset!
  }
  else {
    alertsay No persistent default commands found. Session reset!
  }
}

alias alert_applydefaults {
  var %oldsilent = %alert_silent
  set %alert_silent 1

  var %count = 0
  var %f = $alertdefaultsfile

  if ($exists(%f)) {
    var %i = 1
    while (%i <= $lines(%f)) {
      var %line = $read(%f,%i)

      if (%line) {
        alert_do %line
        inc %count
      }

      inc %i
    }
  }

  if (%oldsilent) {
    set %alert_silent %oldsilent
  }
  else {
    unset %alert_silent
  }

  return %count
}

alias alert_default_target_state {
  ; Returns 1 if defaults say this target should be ON.
  ; Returns 0 if defaults say this target should be OFF.
  ; Returns nothing if no default applies.

  var %target = $lower($1)
  var %state = $null
  var %f = $alertdefaultsfile

  if (!$exists(%f)) return

  var %i = 1
  while (%i <= $lines(%f)) {
    var %line = $read(%f,%i)
    var %cmd = $lower($gettok(%line,1,32))
    var %tgt = $lower($gettok(%line,2,32))

    if ((%cmd == on) && ((%tgt == all) || (%tgt == %target))) {
      var %state = 1
    }

    if ((%cmd == off) && ((%tgt == all) || (%tgt == %target))) {
      var %state = 0
    }

    inc %i
  }

  return %state
}

; -----------------------
; Core command logic
; -----------------------

alias alert_enable_all {
  var %i = 1

  while (%i <= $chan(0)) {
    hadd -m alerts $chan(%i) 1
    inc %i
  }

  var %i = 1

  while (%i <= $query(0)) {
    hadd -m alerts $query(%i) 1
    inc %i
  }

  alertsay Alerts turned ON for ALL channels/queries
}

alias alert_disable_all {
  alert_cancelalltimers

  if ($hget(alerts)) hfree alerts

  alertsay Alerts turned OFF for ALL channels/queries
}

alias alert_temp {
  ; $1 = on/off
  ; $2 = target
  ; $3 = seconds
  ; $4 = original duration text

  if ($hget(alerttimers,$2)) {
    alertsay Error: a temporary alert is already active for $2
    return
  }

  if ($1 == on) {
    if ($hget(alerts,$2)) {
      alertsay Error: alert is already ON for $2
      return
    }

    hadd -m alerts $2 1
  }

  if ($1 == off) {
    if (!$hget(alerts,$2)) {
      alertsay Error: alert is already OFF for $2
      return
    }

    hdel alerts $2
  }

  var %timer = $+(alerttmp,$ticks,$rand(1000,9999))

  hadd -m alerttimers $2 %timer
  hadd -m alerttimer_target %timer $2
  hadd -m alerttimer_action %timer $1

  alert_starttimer %timer $3

  if ($1 == on) {
    alertsay Alert is now ON for $2 for $4
  }
  else {
    alertsay Alert is now OFF for $2 for $4
  }
}

alias alert_do {
  ; /alert help
  if (($1 == help) || ($1 == ?)) {
    alert_help
    return
  }

  ; /alert list
  if ($1 == list) {
    alert_list
    return
  }

  ; /alert defaults
  if ($1 == defaults) {
    alert_defaults
    return
  }

  ; /alert restoredefaults
  if ($1 == restoredefaults) {
    alert_restoredefaults
    return
  }

  ; /alert cooldown [duration]
  if ($1 == cooldown) {
    alert_cooldown $2
    return
  }

  ; /alert ignore nick
  ; /alert ignore list
  if ($1 == ignore) {
    if ((!$2) || ($2 == list)) {
      alert_ignorelist
      return
    }

    if ($2 == all) {
      alertsay Error: /alert ignore all is not supported. Use /alert unignore all to clear the ignore list.
      return
    }

    hadd -m alertignore $2 1
    alertsay Ignoring alerts from $2
    return
  }

  ; /alert unignore nick
  ; /alert unignore all
  if ($1 == unignore) {
    if (!$2) {
      alertsay Usage: /alert unignore nick
      return
    }

    if ($2 == all) {
      if ($hget(alertignore)) hfree alertignore
      alertsay No longer ignoring any nicks
      return
    }

    hdel alertignore $2
    alertsay No longer ignoring alerts from $2
    return
  }

  ; /alert on/off [target/all] [duration]
  if (($1 == on) || ($1 == off)) {
    var %state = $1
    var %target = $2
    var %duration = $3

    ; Allow: /alert on 60s
    ; Means: temporary alert for current active window.
    if (($2) && (!$3) && ($alertduration($2) > 0)) {
      var %target = $active
      var %duration = $2
    }

    if (!%target) {
      var %target = $active
    }

    if (!%target) {
      alertsay Error: no target window found.
      return
    }

    ; /alert on all
    if ((%target == all) && (!%duration)) {
      if (%state == on) {
        alert_enable_all
        return
      }

      if (%state == off) {
        alert_disable_all
        return
      }
    }

    if ((%target == all) && (%duration)) {
      alertsay Error: temporary alerts for all are not supported.
      return
    }

    ; Temporary on/off
    if (%duration) {
      var %seconds = $alertduration(%duration)

      if (%seconds <= 0) {
        alertsay Error: invalid duration. Use examples like 60s, 5m, or 2h.
        return
      }

      alert_temp %state %target %seconds %duration
      return
    }

    ; Normal on/off
    alert_canceltimer %target

    if (%state == on) {
      hadd -m alerts %target 1
      alertmsg ON %target
      return
    }

    if (%state == off) {
      hdel alerts %target
      alertmsg OFF %target
      return
    }
  }

  ; /alert toggle current window
  if (!$1) {
    var %target = $active

    if (!%target) {
      alertsay Error: no active window found.
      return
    }

    alert_canceltimer %target

    if ($hget(alerts,%target)) {
      hdel alerts %target
      alertmsg OFF %target
    }
    else {
      hadd -m alerts %target 1
      alertmsg ON %target
    }

    return
  }

  alertsay Unknown command. Type '/alert help' for a list of available commands.
}

alias alert {
  if ($1 == setdefault) {
    alert_setdefault $2-
    return
  }

  if ($1 == resetdefault) {
    alert_resetdefault
    return
  }

  alert_do $1-
}

; -----------------------
; Message events
; -----------------------

alias alert_should_fire {
  ; $1 = nick

  if ($hget(alertignore,$1)) return 0

  return 1
}

on *:TEXT:*:#:{
  if ($nick == $me) return

  if ($hget(alerts,$chan)) {
    if ($alert_should_fire($nick)) {
      alertplaysound $chan
    }
  }
}

on *:TEXT:*:?:{
  if ($nick == $me) return

  if ($hget(alerts,$nick)) {
    if ($alert_should_fire($nick)) {
      alertplaysound $nick
    }
  }
}

; -----------------------
; Auto-cleanup
; -----------------------

on *:PART:#:{
  if ($nick == $me) {
    alert_canceltimer $chan
    if ($hget(alerts,$chan)) hdel alerts $chan
    if ($hget(alertcooldowns,$chan)) hdel alertcooldowns $chan
  }
}

on *:KICK:#:{
  if ($knick == $me) {
    alert_canceltimer $chan
    if ($hget(alerts,$chan)) hdel alerts $chan
    if ($hget(alertcooldowns,$chan)) hdel alertcooldowns $chan
  }
}

; If a default applies to a channel you just joined, apply it.
on *:JOIN:#:{
  if ($nick == $me) {
    var %state = $alert_default_target_state($chan)

    if (%state == 1) {
      hadd -m alerts $chan 1
    }

    if (%state == 0) {
      hdel alerts $chan
    }
  }
}

; If default says "on all", apply it to new query windows too.
on *:OPEN:?:{
  var %state = $alert_default_target_state($nick)

  if (%state == 1) {
    hadd -m alerts $nick 1
  }

  if (%state == 0) {
    hdel alerts $nick
  }
}

on *:START:{
  alert_initsettings

  ; Current alert state is always reset on restart.
  alert_resetsession
  alert_initsettings

  ; Then apply anything saved with /alert setdefault ...
  alert_applydefaults
}
